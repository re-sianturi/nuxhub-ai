# NuxHub AI — Product Mapping (Offer Engine)
# Layer 9: Problem → Produk mapping. Bukan lempar semua produk.
# Agent/orchestrator load ini, cari problem yang paling match, rekomendasi 1 produk.

products:

  # Template — ganti dengan produk bisnis lo
  # Setiap product punya:
  #   - problem_match: keyword problem yang dihadapi lead
  #   - description: apa produk ini
  #   - value_proposition: apa value yang diberikan
  #   - ideal_for: lead profile ideal
  #   - price_range: range harga (jangan spesifik di chat)
  #   - cta_type: CTA yang cocok
  #   - alternatives: produk alternatif kalau ini tidak cocok

  paket_starter:
    problem_match: ["lead sedikit", "baru mulai", "coba-coba", "test", "testing",
                    "baru buka", "pemula", "kecil", "anggaran terbatas"]
    description: "Paket starter untuk bisnis yang baru mulai atau mau testing"
    value_proposition: "Mulai dengan risiko rendah, lihat hasil dulu sebelum scale up"
    ideal_for:
      business_stage: ["baru", "kecil", "testing"]
      budget: "< 5 juta"
      timeline: "segera"
    price_range: "1-5 juta"
    cta_type: "consultation"
    alternatives: ["paket_profesional"]

  paket_profesional:
    problem_match: ["lead stagnan", "tidak berkembang", "butuh growth", "scale",
                    "mau naik", "target naik", "scale up", "berkembang"]
    description: "Paket profesional untuk bisnis yang sudah jalan dan mau growth"
    value_proposition: "Scale yang sudah jalan, optimasi yang sudah ada, growth konsisten"
    ideal_for:
      business_stage: ["menengah", "berkembang"]
      budget: "5-20 juta"
      timeline: "1-3 bulan"
    price_range: "5-20 juta"
    cta_type: "demo"
    alternatives: ["paket_starter", "paket_enterprise"]

  paket_enterprise:
    problem_match: ["banyak lead", "butuh tim", "kompleks", "enterprise",
                    "banyak divisi", "multi channel", "omset besar"]
    description: "Solusi enterprise untuk bisnis besar dengan kebutuhan kompleks"
    value_proposition: "Full-stack solution dengan dedicated team dan custom strategy"
    ideal_for:
      business_stage: ["besar", "enterprise", "established"]
      budget: "> 20 juta"
      timeline: "custom"
    price_range: "> 20 juta"
    cta_type: "consultation"
    alternatives: ["paket_profesional"]

  konsultasi:
    problem_match: ["bingung", "gak tau", "tidak tahu", "perlu saran", "masih belajar",
                    "gak ngerti", "tidak paham", "konsultasi", "nanya dulu"]
    description: "Sesi konsultasi 1-on-1 untuk diagnosa masalah dan rekomendasi"
    value_proposition: "Dapat clarity dulu sebelum commit — gratis, tanpa tekanan"
    ideal_for:
      business_stage: ["semua"]
      budget: "semua"
      timeline: "semua"
    price_range: "Gratis"
    cta_type: "consultation"
    alternatives: ["paket_starter"]

# ============================================================
# OFFER TIMING RULES
# ============================================================
offer_rules:
  precondition:
    fields_filled_minimum: 6    # minimal 6 dari 8 field discovery terisi
    bant_score_minimum: 50      # harus qualified (warm atau hot)
    personality_known: true     # personality harus sudah terdeteksi

  offer_presentation:
    analytical: "Data-driven: kasih angka, case study, ROI calculation"
    driver: "Direct: kasih 2-3 opsi, rekomendasi yang paling cocok"
    amiable: "Relationship-first: hubungkan ke masalah personal mereka"
    expressive: "Vision-driven: gambarkan hasil akhir yang exciting"

  anti_spam_offer:
    - "Jangan offer kalau discovery belum selesai"
    - "Jangan offer lebih dari 2x dalam satu conversation"
    - "Jangan offer kalau lead lagi di OBJECTION state"
    - "Jangan lempar semua produk — pilih SATU yang paling match"

# ============================================================
# PROBLEM → PRODUCT MATCHING ALGORITHM
# ============================================================
matching:
  method: "keyword_match + semantic + lead_profile"
  steps:
    - "1. Ambil 'masalah' dari lead_profile"
    - "2. Cocokkan keyword dengan problem_match tiap produk"
    - "3. Kalau multiple match → filter by budget + business_stage"
    - "4. Kalau masih multiple → pilih yang paling spesifik (keyword count terbanyak)"
    - "5. Kalau tidak ada match → default ke konsultasi"
  default: "konsultasi"   # fallback kalau tidak ada match
