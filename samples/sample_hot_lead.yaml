# NuxHub AI — Sample Conversation: Hot Lead
# Flow: NEW_LEAD → DISCOVERY → QUALIFICATION → OFFERING → CLOSING → CONVERSION
# Tipe: Driver | Objective: booking_meeting

conversation:
  lead_id: "lead-sample-hot-001"
  objective: "booking_meeting"

  messages:
    - turn: 1
      from: "user"
      message: "Halo, saya butuh bantuan untuk dapat lebih banyak customer. Bisa bantu?"

    - turn: 2
      from: "agent"
      state: "DISCOVERY"
      agent: "Discovery"
      message: "Tentu, Pak. Boleh saya tahu bisnis apa yang sedang Bapak jalankan?"
      personality_detected: null

    - turn: 3
      from: "user"
      message: "Klinik kecantikan di Jakarta Selatan. Sudah jalan 3 tahun."

    - turn: 4
      from: "agent"
      state: "DISCOVERY"
      agent: "Discovery"
      message: "Klinik kecantikan 3 tahun — artinya sudah established. Saat ini sumber pasien utamanya dari mana, Pak?"
      personality_detected: "driver"

    - turn: 5
      from: "user"
      message: "Dari IG, tapi sekarang saingan banyak. Pasien baru mulai turun."

    - turn: 6
      from: "agent"
      state: "DISCOVERY"
      agent: "Discovery"
      message: "Paham. Kalau boleh tahu, target pasien baru per bulan yang Bapak harapkan berapa?"
      personality_detected: "driver"

    - turn: 7
      from: "user"
      message: "Minimal 50 pasien baru per bulan. Budget sekitar 10 juta."

    - turn: 8
      from: "agent"
      state: "DISCOVERY"
      agent: "Discovery"
      message: "50 pasien per bulan dengan budget 10 juta — jelas targetnya. Kapan Bapak berharap mulai?"
      personality_detected: "driver"

    - turn: 9
      from: "user"
      message: "Secepatnya. Bulan ini kalau bisa. Saya yang ambil keputusan."

    - turn: 10
      from: "agent"
      state: "QUALIFICATION"
      agent: "Qualification"
      message: "Siap, Pak. Jadi: klinik kecantikan, Jakarta Selatan, target 50 pasien baru/bulan, budget 10 juta, mulai secepatnya, Bapak decision maker. Saya sudah punya gambaran. Ada 3 pendekatan yang bisa kita ambil — saya rekomendasikan yang paling cocok untuk situasi Bapak."

